      --white:#ffffff;
      --dark:#121212;
      --line:rgba(255,255,255,.15);

      --shadow:0 16px 40px rgba(0,0,0,.14);

      --max:1240px;

    html{scroll-behavior:smooth}

      font-family:"Inter",sans-serif;
      background:var(--bg);

      line-height:1.6;
